<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM · Morena Pitaya</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    
    <style>
        :root {
            --rosa: #e8375a; --navy: #0f1923; --navy2: #162030; --card: #192535; 
            --border: #243448; --text: #e8edf3; --muted: #7a94b0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--navy); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
        .sidebar { position: fixed; top: 0; left: 0; width: 220px; height: 100vh; background: var(--navy2); border-right: 1px solid var(--border); padding: 32px 0; z-index: 100; }
        .main { margin-left: 220px; padding: 32px; min-height: 100vh; }
        .page-header { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 16px; margin-bottom: 32px; }
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .kpi-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
        .kpi-value { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 700; }
        .kpi-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }
        .chart-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 24px; }
        .chart-wrap { position: relative; height: 380px; width: 100%; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { padding: 12px 8px; border-bottom: 1px solid rgba(36,52,72,0.5); text-align: left; }
        .status-alert { padding: 4px 8px; border-radius: 4px; background: rgba(232,55,90,0.15); color: var(--rosa); border: 1px solid rgba(232,55,90,0.3); font-size: 11px; }
        .btn-wa { background: #25d366; color: white; padding: 8px 16px; border-radius: 6px; text-decoration: none; font-size: 11px; display: inline-block; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-item { padding: 12px 24px; cursor: pointer; color: var(--muted); }
        .nav-item.active { color: white; background: rgba(232,55,90,0.1); border-left: 3px solid var(--rosa); }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="logo" style="padding: 0 24px 32px; border-bottom: 1px solid var(--border);">
        <div style="font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 900; color: var(--rosa);">Morena Pitaya</div>
        <div style="font-size: 10px; color: var(--muted);">CRM Dashboard</div>
    </div>
    <nav class="nav">
        <div class="nav-item active" onclick="showTab('geral')">📊 Visão Geral</div>
        <div class="nav-item" onclick="showTab('reativacao')">⚠️ Reativação</div>
        <div class="nav-item" onclick="showTab('interacoes')">💬 Interações</div>
        <div class="nav-item" onclick="showTab('produtos')">👗 Produtos</div>
    </nav>
</aside>

<main class="main">
    <header class="page-header">
        <div>
            <h1 style="font-family: 'Playfair Display', serif; font-size: 28px;">Dashboard Operacional</h1>
            <p id="data-label" style="color: var(--muted);">Filtro atual: 7 Dias</p>
        </div>
        <div style="display: flex; gap: 8px; background: var(--navy2); padding: 4px; border-radius: 8px; border: 1px solid var(--border);">
            <button class="filter-btn active" onclick="filterData('7d', this)">7 Dias</button>
            <button class="filter-btn" onclick="filterData('30d', this)">30 Dias</button>
            <button class="filter-btn" onclick="filterData('max', this)">Máximo</button>
        </div>
    </header>

    <!-- ABA VISÃO GERAL -->
    <section id="geral" class="tab-content active">
        <div class="kpi-grid">
            <div class="kpi-card"><div class="kpi-value" id="kpi-leads">4.800</div><div class="kpi-label">Leads</div></div>
            <div class="kpi-card"><div class="kpi-value" id="kpi-interacoes">35.383</div><div class="kpi-label">Interações</div></div>
        </div>
        <div class="chart-card">
            <div class="chart-wrap">
                <canvas id="mainChart"></canvas>
            </div>
        </div>
    </section>

    <!-- Outras abas (simplificadas por enquanto) -->
    <section id="reativacao" class="tab-content">
        <div class="chart-card">
            <h3>🚨 Prioridade de Reativação</h3>
            <table><thead><tr><th>Cliente</th><th>Interações</th><th>Ação</th></tr></thead><tbody id="listaReativacao"></tbody></table>
        </div>
    </section>

    <section id="interacoes" class="tab-content">
        <div class="chart-card"><h3>💬 Interações</h3><p>Em breve...</p></div>
    </section>

    <section id="produtos" class="tab-content">
        <div class="chart-card"><h3>👗 Top Produtos</h3><p>Em breve...</p></div>
    </section>
</main>

<script>
// ==================== VARIÁVEIS ====================
let myChart = null;

// ==================== INICIALIZAÇÃO DO GRÁFICO (com proteção) ====================
function initChart() {
    const canvas = document.getElementById('mainChart');
    if (!canvas) {
        console.error("❌ Canvas #mainChart não encontrado!");
        return;
    }

    const ctx = canvas.getContext('2d');
    if (!ctx) {
        console.error("❌ Não foi possível obter o contexto 2d do canvas");
        return;
    }

    myChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sab', 'Dom'],
            datasets: [{
                label: 'Interações',
                data: [450, 580, 920, 660, 310, 400, 90],
                backgroundColor: '#e8375a',
                borderRadius: 6
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
                y: { ticks: { color: '#7a94b0' }, grid: { color: 'rgba(255,255,255,0.05)' } },
                x: { ticks: { color: '#7a94b0' }, grid: { display: false } }
            }
        }
    });
    console.log("✅ Gráfico criado com sucesso");
}

// ==================== FILTRO ====================
function filterData(periodo, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');
    
    document.getElementById('data-label').innerText = `Filtro atual: ${btn ? btn.innerText : periodo}`;
    
    // Atualiza KPIs (mock)
    document.getElementById('kpi-leads').innerText = "4.800";
    document.getElementById('kpi-interacoes').innerText = "35.383";
}

// ==================== TROCAR ABA ====================
function showTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
    const activeTab = document.getElementById(tabId);
    if (activeTab) activeTab.classList.add('active');

    document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
    const activeItem = Array.from(document.querySelectorAll('.nav-item')).find(item => 
        item.getAttribute('onclick').includes(tabId)
    );
    if (activeItem) activeItem.classList.add('active');
}

// ==================== INICIALIZAÇÃO ====================
window.onload = function() {
    console.log("🚀 Página carregando...");
    initChart();
    console.log("✅ Dashboard inicializado");
};
</script>
</body>
</html>
