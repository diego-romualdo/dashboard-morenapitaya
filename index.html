<script>
// ─── Config ──────────────────────────────────────────────────────────────────
const SB_URL = 'https://supabase.morenapitaya.com';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjoxNzc2MDQ5MjAwLCJleHAiOjE5MzM4MTU2MDB9.PVvpnzkL7mdGkMKO1XCR2c8awZuZJ6NyeT_3qB06EMI';

const HEADERS = { 
  apikey: SB_KEY, 
  Authorization: `Bearer ${SB_KEY}` 
};

const REFRESH_INTERVAL = 60000; // 60s

let currentPeriod = 'now';
let currentPage = 'overview';
let refreshTimer = null;
let charts = {};
let inativosData = [];
let inativosPage = 0;
const INATIVOS_PER_PAGE = 30;

// ─── Utils ────────────────────────────────────────────────────────────────────
function periodToDate(p) {
  const now = new Date();
  if (p === 'now') return new Date(now - 24*60*60*1000);
  if (p === '7d') return new Date(now - 7*24*60*60*1000);
  if (p === '30d') return new Date(now - 30*24*60*60*1000);
  return null; // max
}

function fmtNum(n) {
  if (n >= 1000) return (n/1000).toFixed(1).replace('.',',') + 'k';
  return n?.toLocaleString('pt-BR') ?? '—';
}

function fmtDate(iso) {
  return new Date(iso).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
}

function diasAtras(iso) {
  return Math.floor((Date.now() - new Date(iso)) / 86400000);
}

async function sbFetch(path) {
  const r = await fetch(`${SB_URL}/rest/v1/${path}`, { headers: HEADERS });
  if (!r.ok) throw new Error(`HTTP ${r.status}: ${await r.text()}`);
  return r.json();
}

// ─── Chart helpers ────────────────────────────────────────────────────────────
function destroyChart(id) { 
  if (charts[id]) { 
    charts[id].destroy(); 
    delete charts[id]; 
  } 
}

function buildBarChart(id, labels, datasets, stacked=false) {
  destroyChart(id);
  const ctx = document.getElementById(id);
  if (!ctx) return;
  charts[id] = new Chart(ctx, {
    type: 'bar',
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      animation: { duration: 400 },
      plugins: { legend: { labels: { color: '#7a94b0', font: { size: 11 } } } },
      scales: {
        x: { stacked, grid: { color: 'rgba(255,255,255,.03)' }, ticks: { color: '#7a94b0', font: { size: 10 }, maxRotation: 45 } },
        y: { stacked, grid: { color: 'rgba(255,255,255,.04)' }, ticks: { color: '#7a94b0', font: { size: 10 } } }
      }
    }
  });
}

function buildDoughnut(id, labels, data, colors) {
  destroyChart(id);
  const ctx = document.getElementById(id);
  if (!ctx) return;
  charts[id] = new Chart(ctx, {
    type: 'doughnut',
    data: { labels, datasets: [{ data, backgroundColor: colors, borderColor: colors, borderWidth: 2, hoverOffset: 8 }] },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '68%',
      animation: { duration: 400 },
      plugins: { legend: { position: 'bottom', labels: { color: '#7a94b0', font: { size: 12 }, padding: 14 } } }
    }
  });
}

// ─── Navigation, Period, etc. (mantido igual) ────────────────────────────────
function showPage(page, el) { /* ... mesmo código ... */ }
function toggleSidebar() { /* ... */ }
function closeSidebar() { /* ... */ }

// ─── Main load ────────────────────────────────────────────────────────────────
async function loadAll() {
  showError(false);
  try {
    await loadPageData();
    document.getElementById('lastUpdateTime').textContent = 'Atualizado: ' + new Date().toLocaleTimeString('pt-BR');
  } catch(e) {
    console.error(e);
    showError(true);
  }
}

function showError(show) {
  document.getElementById('errorBar').style.display = show ? 'block' : 'none';
}

async function loadPageData() {
  try {
    if (currentPage === 'overview') await loadOverview();
    if (currentPage === 'contatos') await loadContatos();
    if (currentPage === 'interacoes') await loadInteracoes();
    if (currentPage === 'produtos') await loadProdutos();
    if (currentPage === 'inativos') await loadInativos();
  } catch(e) {
    console.error('Erro ao carregar página:', e);
    showError(true);
  }
}

// ─── Helper: filtro de data ─────────────────────────────────────────────────
function periodFilter(col='horario_msg') {
  const d = periodToDate(currentPeriod);
  return d ? `&${col}=gte.${d.toISOString()}` : '';
}

// ─── OVERVIEW (principalmente corrigido) ────────────────────────────────────
async function loadOverview() {
  const pf = periodFilter();
  const pfCriado = periodFilter('criado_em');

  // Total de contatos
  const rContatos = await fetch(`${SB_URL}/rest/v1/crm_contacts?select=id&limit=1`, {
    headers: { ...HEADERS, Prefer: 'count=exact' }
  });
  const totalContatos = parseInt(rContatos.headers.get('content-range')?.split('/')[1] ?? 0);

  // Interações no período
  const rInter = await fetch(`${SB_URL}/rest/v1/crm_interactions?select=id${pf}&limit=1`, {
    headers: { ...HEADERS, Prefer: 'count=exact' }
  });
  const totalInter = parseInt(rInter.headers.get('content-range')?.split('/')[1] ?? 0);

  // Interações hoje
  const hoje = new Date(); 
  hoje.setHours(0,0,0,0);
  const rHoje = await fetch(`${SB_URL}/rest/v1/crm_interactions?select=id&horario_msg=gte.${hoje.toISOString()}&limit=1`, {
    headers: { ...HEADERS, Prefer: 'count=exact' }
  });
  const totalHoje = parseInt(rHoje.headers.get('content-range')?.split('/')[1] ?? 0);

  // === PRODUTO MAIS QUENTE (corrigido) ===
  let topProd = null;
  try {
    const rProd = await fetch(
      `${SB_URL}/rest/v1/crm_interactions?select=produto_codigos${pf}&limit=3000`,
      { headers: HEADERS }
    );

    if (rProd.ok) {
      const prodRows = await rProd.json();
      const prodCount = {};

      prodRows.forEach(r => {
        try {
          let codes = r.produto_codigos;
          if (typeof codes === 'string') codes = JSON.parse(codes);
          if (Array.isArray(codes)) {
            codes.forEach(c => {
              if (/^\d{4}$/.test(c)) {
                prodCount[c] = (prodCount[c] || 0) + 1;
              }
            });
          }
        } catch (e) {}
      });

      const sorted = Object.entries(prodCount).sort((a, b) => b[1] - a[1]);
      topProd = sorted[0] || null;
    }
  } catch (e) {
    console.warn("Erro ao buscar produto mais quente:", e);
  }

  // Novos contatos no período
  const rNovos = await fetch(`${SB_URL}/rest/v1/crm_contacts?select=id${pfCriado}&limit=1`, {
    headers: { ...HEADERS, Prefer: 'count=exact' }
  });
  const novosContatos = parseInt(rNovos.headers.get('content-range')?.split('/')[1] ?? 0);

  // Canais no período
  const rCanais = await fetch(
    `${SB_URL}/rest/v1/crm_interactions?select=canal,horario_msg${pf}&limit=5000`,
    { headers: HEADERS }
  );
  const canaisRows = rCanais.ok ? await rCanais.json() : [];
  
  let ig = 0, wa = 0;
  canaisRows.forEach(r => {
    if (r.canal === 'instagram') ig++;
    else wa++;
  });
  const total = ig + wa || 1;

  // KPIs
  document.getElementById('kpiGrid').innerHTML = `
    <div class="kpi-card rosa">
      <div class="kpi-icon">👥</div>
      <div class="kpi-value">${fmtNum(totalContatos)}</div>
      <div class="kpi-label">Total de Contatos</div>
      <div class="kpi-sub"><span>+${fmtNum(novosContatos)}</span> no período</div>
    </div>
    <div class="kpi-card verde">
      <div class="kpi-icon">💬</div>
      <div class="kpi-value">${fmtNum(totalInter)}</div>
      <div class="kpi-label">Interações</div>
      <div class="kpi-sub">No período · <span>${fmtNum(totalHoje)}</span> hoje</div>
    </div>
    <div class="kpi-card gold">
      <div class="kpi-icon">📷</div>
      <div class="kpi-value">${Math.round(ig/total*100)}%</div>
      <div class="kpi-label">Canal Instagram</div>
      <div class="kpi-sub">
        <span class="canal-pill canal-ig">${fmtNum(ig)} msgs</span> 
        <span class="canal-pill canal-wa">${fmtNum(wa)} WA</span>
      </div>
    </div>
    <div class="kpi-card blue">
      <div class="kpi-icon">🔥</div>
      <div class="kpi-value">Cód. ${topProd?.[0] ?? '—'}</div>
      <div class="kpi-label">Produto Mais Quente</div>
      <div class="kpi-sub"><span>${fmtNum(topProd?.[1] ?? 0)}</span> consultas no período</div>
    </div>`;

  // Funil (mantido)
  const rWA = await fetch(`${SB_URL}/rest/v1/crm_contacts?select=id&canal=eq.whatsapp&limit=1`,{headers:{...HEADERS,Prefer:'count=exact'}});
  const rIG = await fetch(`${SB_URL}/rest/v1/crm_contacts?select=id&canal=eq.instagram&limit=1`,{headers:{...HEADERS,Prefer:'count=exact'}});
  const nWA = parseInt(rWA.headers.get('content-range')?.split('/')[1]??0);
  const nIG = parseInt(rIG.headers.get('content-range')?.split('/')[1]??0);

  document.getElementById('funilGrid').innerHTML = `
    <div class="funil-item"><div class="funil-count" style="color:var(--rosa)">${fmtNum(totalContatos)}</div><div class="funil-label">Total</div><div class="funil-bar" style="background:var(--rosa)"></div></div>
    <div class="funil-item"><div class="funil-count" style="color:#5b8def">${fmtNum(nWA)}</div><div class="funil-label">WhatsApp</div><div class="funil-bar" style="background:#5b8def"></div></div>
    <div class="funil-item"><div class="funil-count" style="color:var(--gold)">${fmtNum(nIG)}</div><div class="funil-label">Instagram</div><div class="funil-bar" style="background:var(--gold)"></div></div>
    <div class="funil-item"><div class="funil-count" style="color:var(--muted)">${fmtNum(totalContatos - (nWA + nIG))}</div><div class="funil-label">Inativos +30d</div><div class="funil-bar" style="background:var(--muted)"></div></div>`;

  // Charts
  const byDay = {};
  canaisRows.forEach(r => {
    const d = fmtDate(r.horario_msg);
    if (!byDay[d]) byDay[d] = {ig:0, wa:0};
    if (r.canal === 'instagram') byDay[d].ig++; else byDay[d].wa++;
  });

  const days = Object.keys(byDay).sort();
  document.getElementById('badgeCanais').textContent = currentPeriod === 'now' ? '24h' : currentPeriod === '7d' ? '7 dias' : currentPeriod === '30d' ? '30 dias' : 'Tudo';

  buildBarChart('chartCanais', days, [
    {label:'Instagram', data:days.map(d=>byDay[d].ig), backgroundColor:'rgba(232,55,90,.8)', borderRadius:4},
    {label:'WhatsApp', data:days.map(d=>byDay[d].wa), backgroundColor:'rgba(122,182,72,.8)', borderRadius:4}
  ]);

  buildDoughnut('chartDoughnut', ['Instagram','WhatsApp'], [ig, wa], ['rgba(232,55,90,.85)','rgba(122,182,72,.85)']);

  // Performance block (mantido)
  const mediaD = days.length ? Math.round((ig+wa)/days.length) : 0;
  document.getElementById('performanceBlock').innerHTML = `...` ; // mantenha o seu bloco ou me avise se quiser simplificado
}

// As outras funções (loadContatos, loadInteracoes, loadProdutos, loadInativos) 
// permanecem iguais por enquanto. Se quiser, posso corrigir também.

function startRefresh() {
  clearInterval(refreshTimer);
  refreshTimer = setInterval(loadAll, REFRESH_INTERVAL);
}

(async function init() {
  try {
    await loadAll();
  } catch(e) {
    console.error(e);
    showError(true);
  } finally {
    document.getElementById('loadingOverlay').classList.add('hidden');
    startRefresh();
  }
})();
</script>
