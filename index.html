<script>
// ==================== VARIÁVEIS GLOBAIS ====================
let myChart;

// Dados mockados (vamos substituir por API depois)
const db = {
    'hoje': { 
        leads: 42, 
        interacoes: 1240, 
        labels: ['00h','06h','12h','18h','Agora'], 
        data: [15,8,310,520,108],
        produtos: [{cod:'0918', nome:'Corselet', qtd:45}] 
    },
    '7d': { 
        leads: 4800, 
        interacoes: 35383, 
        labels: ['Seg','Ter','Qua','Qui','Sex','Sab','Dom'], 
        data: [450,580,920,660,310,400,90],
        produtos: [{cod:'0918', nome:'Corselet', qtd:842}, {cod:'0773', nome:'Blazer', qtd:410}] 
    },
    '30d': { 
        leads: 5120, 
        interacoes: 120400, 
        labels: ['Sem 1','Sem 2','Sem 3','Sem 4'], 
        data: [2500,3100,2800,3400],
        produtos: [{cod:'0411', nome:'Calça', qtd:1200}, {cod:'0918', nome:'Corselet', qtd:980}] 
    },
    'max': { 
        leads: 6400, 
        interacoes: 450000, 
        labels: ['Jan','Fev','Mar','Abr'], 
        data: [12000,15000,18000,22000],
        produtos: [{cod:'0918', nome:'Corselet', qtd:5400}, {cod:'0888', nome:'Vestido', qtd:4200}] 
    }
};

let baseClientes = Array.from({length: 85}, (_, i) => ({
    nome: `Cliente Plus ${i+1}`,
    tel: "5531999999999",
    dias: Math.floor(Math.random() * 7) + 7,
    interacoes: Math.floor(Math.random() * 650) + 50,
    cod: ["0918", "0888", "0773", "0411"][Math.floor(Math.random() * 4)]
}));

// ==================== FUNÇÕES DE RENDERIZAÇÃO ====================
function createReativacaoRow(cliente) {
    const tr = document.createElement('tr');
    const msg = encodeURIComponent(`Olá ${cliente.nome}! Notamos seu interesse no item ${cliente.cod}...`);
    const waLink = `https://wa.me/${cliente.tel}?text=${msg}`;

    tr.innerHTML = `
        <td>${cliente.nome}</td>
        <td><span class="status-alert">${cliente.dias} dias</span></td>
        <td><strong>${cliente.interacoes}</strong></td>
        <td>${cliente.cod}</td>
        <td><a href="${waLink}" target="_blank" rel="noopener noreferrer" class="btn-wa">WhatsApp</a></td>
    `;
    return tr;
}

function renderReativacao() {
    const tbody = document.getElementById('listaReativacao');
    tbody.innerHTML = '';

    const ordenados = [...baseClientes]
        .sort((a, b) => b.interacoes - a.interacoes)
        .slice(0, 50);

    ordenados.forEach(cliente => {
        tbody.appendChild(createReativacaoRow(cliente));
    });
}

function renderProdutos(periodo) {
    const tbody = document.getElementById('listaProdutosBody');
    tbody.innerHTML = db[periodo].produtos.map(p => `
        <tr>
            <td><strong>${p.cod}</strong></td>
            <td>${p.nome}</td>
            <td>${p.qtd.toLocaleString('pt-BR')} consultas</td>
        </tr>
    `).join('');
}

// ==================== GRÁFICO ====================
function initChart() {
    const ctx = document.getElementById('mainChart').getContext('2d');
    myChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: db['7d'].labels,
            datasets: [{
                label: 'Interações',
                data: db['7d'].data,
                backgroundColor: '#e8375a',
                borderRadius: 6
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false },
                datalabels: { anchor: 'end', align: 'top', color: '#e8edf3', font: { weight: '600' } }
            },
            scales: {
                y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#7a94b0' } },
                x: { grid: { display: false }, ticks: { color: '#7a94b0' } }
            },
            layout: { padding: { top: 30 } }
        }
    });
}

// ==================== FILTRO PRINCIPAL (CORRIGIDO) ====================
function filterData(periodo, button) {
    // Atualiza botões ativos
    document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
    if (button) button.classList.add('active');

    // Atualiza texto do filtro
    const filtroTexto = button ? button.innerText : '7 Dias';
    document.getElementById('data-label').innerText = `Filtro atual: ${filtroTexto}`;

    // Atualiza KPIs
    document.getElementById('kpi-leads').innerText = db[periodo].leads.toLocaleString('pt-BR');
    document.getElementById('kpi-interacoes').innerText = db[periodo].interacoes.toLocaleString('pt-BR');

    // Atualiza gráfico
    if (myChart) {
        myChart.data.labels = db[periodo].labels;
        myChart.data.datasets[0].data = db[periodo].data;
        myChart.update();
    }

    // Atualiza tabelas
    renderProdutos(periodo);
    renderReativacao();
}

// ==================== TROCAR ABA ====================
function showTab(tabId) {
    // Desativa todas as abas
    document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');

    // Desativa todos os itens do menu
    document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
    
    // Ativa o item clicado (precisa encontrar qual foi clicado)
    const navItems = document.querySelectorAll('.nav-item');
    for (let item of navItems) {
        if (item.getAttribute('onclick').includes(tabId)) {
            item.classList.add('active');
            break;
        }
    }
}

// ==================== INICIALIZAÇÃO ====================
window.onload = () => {
    initChart();
    renderReativacao();
    renderProdutos('7d');

    // Garante que o botão "7 Dias" esteja ativo no início
    const activeBtn = document.querySelector('.filter-btn.active');
    if (activeBtn) activeBtn.classList.add('active');
};
</script>
