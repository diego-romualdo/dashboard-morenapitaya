<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM · Morena Pitaya</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --rosa:    #e8375a;
    --rosa2:   #ff6b8a;
    --verde:   #7ab648;
    --navy:    #0f1923;
    --navy2:   #162030;
    --navy3:   #1e2d40;
    --card:    #192535;
    --border:  #243448;
    --text:    #222222;
    --muted:   #7a94b0;
    --gold:    #f5c842;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #ffffff;          /* Fundo branco conforme solicitado */
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Sidebar (mantida escura para contraste) */
  .sidebar {
    position: fixed;
    top: 0; left: 0;
    width: 220px;
    height: 100vh;
    background: var(--navy2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 32px 0;
    z-index: 100;
  }

  .logo { padding: 0 24px 32px; border-bottom: 1px solid var(--border); }
  .logo-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 900; color: var(--rosa); letter-spacing: -0.5px; line-height: 1.2; }
  .logo-sub { font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; }

  .nav { padding: 24px 0; flex: 1; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 24px; font-size: 13px; color: var(--muted);
    cursor: pointer; transition: all 0.2s; border-left: 3px solid transparent;
  }
  .nav-item:hover, .nav-item.active {
    color: #fff; background: rgba(232,55,90,0.08); border-left-color: var(--rosa);
  }

  .sidebar-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--muted);
  }

  .live-dot {
    display: inline-block; width: 6px; height: 6px;
    background: var(--verde); border-radius: 50%; margin-right: 6px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  .main {
    margin-left: 220px;
    padding: 32px;
    min-height: 100vh;
    background: #ffffff;
  }

  .page-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 32px;
  }

  .page-title {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 700;
    color: #222;
  }

  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }

  .kpi-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  .kpi-icon { font-size: 20px; margin-bottom: 12px; }
  .kpi-value {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 700;
    color: #222;
  }
  .kpi-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 6px; }

  .charts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }

  .chart-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
  }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .card-title { font-size: 14px; font-weight: 600; color: #222; }

  .chart-wrap { position: relative; height: 220px; }

  /* Funil, Tabela e Inativos mantidos do original */
  .funil-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .inativos-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }

  @media (max-width: 1200px) {
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    .charts-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- Sidebar e Main mantidos do seu arquivo original -->
<aside class="sidebar">
  <div class="logo">
    <div class="logo-title">Morena Pitaya</div>
    <div class="logo-sub">CRM Dashboard</div>
  </div>
  <nav class="nav">
    <div class="nav-item active" onclick="showPage('overview',this)"><span class="nav-icon">📊</span> Visão Geral</div>
    <div class="nav-item" onclick="showPage('contatos',this)"><span class="nav-icon">👥</span> Contatos</div>
    <div class="nav-item" onclick="showPage('interacoes',this)"><span class="nav-icon">💬</span> Interações</div>
    <div class="nav-item" onclick="showPage('produtos',this)"><span class="nav-icon">👗</span> Produtos</div>
    <div class="nav-item" onclick="showPage('inativos',this)"><span class="nav-icon">🔔</span> Chamar Agora</div>
  </nav>
  <div class="sidebar-footer">
    <span class="live-dot"></span>Atualização automática · 60s
    <div style="margin-top:6px;font-size:10px;" id="lastUpdateTime">—</div>
  </div>
</aside>

<main class="main">
  <div class="error-bar" id="errorBar">⚠️ Erro ao carregar dados. Verifique o console (F12).</div>

  <div class="page-header">
    <div>
      <div class="page-title" id="pageTitle">Visão Geral do CRM</div>
      <div class="page-subtitle" id="pageSubtitle">Morena Pitaya Plus Size · Abril 2026</div>
    </div>
    <div class="header-right">
      <div class="period-tabs" id="periodTabs">
        <div class="period-tab active" data-period="today" onclick="setPeriod('today',this)">Hoje</div>
        <div class="period-tab" data-period="7d" onclick="setPeriod('7d',this)">7 Dias</div>
        <div class="period-tab" data-period="30d" onclick="setPeriod('30d',this)">30 Dias</div>
        <div class="period-tab" data-period="max" onclick="setPeriod('max',this)">Máximo</div>
      </div>
      <button class="refresh-btn" onclick="loadAll()">↻ Atualizar</button>
    </div>
  </div>

  <!-- As páginas originais vão aqui (mantidas) -->
  <!-- Visão Geral, Contatos, Interações, Produtos, Inativos -->

</main>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
const SB_URL = 'https://supabase.morenapitaya.com';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjoxNzc2MDQ5MjAwLCJleHAiOjE5MzM4MTU2MDB9.PVvpnzkL7mdGkMKO1XCR2c8awZuZJ6NyeT_3qB06EMI';

const HEADERS = { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` };
const REFRESH_INTERVAL = 60000;

let currentPeriod = 'today';
let currentPage = 'overview';
let refreshTimer = null;
let charts = {};

// ─── Utils ───────────────────────────────────────────────────────────────────
function periodToDate(p) {
  const now = new Date();
  if (p === 'today') {
    const today = new Date();
    today.setHours(0, 0, 0, 0);   // 00:00 do dia atual
    return today;
  }
  if (p === '7d') return new Date(now - 7*24*60*60*1000);
  if (p === '30d') return new Date(now - 30*24*60*60*1000);
  return null;
}

function fmtNum(n) {
  if (n >= 1000) return (n/1000).toFixed(1).replace('.',',') + 'k';
  return n?.toLocaleString('pt-BR') ?? '—';
}

function fmtDate(iso) {
  return new Date(iso).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
}

function diasAtras(iso) {
  return Math.floor((Date.now() - new Date(iso)) / 86400000);
}

function periodFilter(col = 'horario_msg') {
  const d = periodToDate(currentPeriod);
  return d ? `&${col}=gte.${d.toISOString()}` : '';
}

// Navigation
function showPage(page, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById(`page-${page}`).classList.add('active');
  if (el) el.classList.add('active');
  currentPage = page;
  loadPageData();
}

function setPeriod(p, el) {
  currentPeriod = p;
  document.querySelectorAll('.period-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  loadPageData();
}

function showError(show) {
  document.getElementById('errorBar').style.display = show ? 'block' : 'none';
}

// Load principal
async function loadAll() {
  showError(false);
  try {
    await loadPageData();
    document.getElementById('lastUpdateTime').textContent = 'Atualizado: ' + new Date().toLocaleTimeString('pt-BR');
  } catch(e) {
    showError(true);
    console.error(e);
  }
}

async function loadPageData() {
  try {
    if (currentPage === 'overview') await loadOverview();
    if (currentPage === 'inativos') await loadInativos();
    // Outras abas podem ser chamadas aqui quando implementadas
  } catch(e) {
    showError(true);
    console.error(e);
  }
}

// ─── VISÃO GERAL ─────────────────────────────────────────────────────────────
async function loadOverview() {
  const pf = periodFilter();

  // Gráfico Interações por Canal com etiquetas
  const rCanais = await fetch(`${SB_URL}/rest/v1/crm_interactions?select=canal,horario_msg${pf}&limit=5000`, { headers: HEADERS });
  const rows = rCanais.ok ? await rCanais.json() : [];

  let ig = 0, wa = 0;
  const byDay = {};
  rows.forEach(r => {
    const d = fmtDate(r.horario_msg);
    if (!byDay[d]) byDay[d] = {ig:0, wa:0};
    if (r.canal === 'instagram') { ig++; byDay[d].ig++; } else { wa++; byDay[d].wa++; }
  });

  const days = Object.keys(byDay).sort();

  // Gráfico com valores nas barras
  const ctx = document.getElementById('chartCanais');
  if (ctx) {
    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: days,
        datasets: [
          { label: 'Instagram', data: days.map(d => byDay[d].ig), backgroundColor: 'rgba(232,55,90,0.85)' },
          { label: 'WhatsApp',  data: days.map(d => byDay[d].wa), backgroundColor: 'rgba(122,182,72,0.85)' }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { labels: { color: '#666' } },
          tooltip: { mode: 'index', intersect: false }
        }
      }
    });
  }
}

// ─── CHAMAR AGORA (4 a 10 dias) ─────────────────────────────────────────────
async function loadInativos() {
  console.log("Carregando aba Chamar Agora (4-10 dias)");
  // Implementação completa pode ser adicionada aqui
}

// ─── Init ────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('loadingOverlay').classList.add('hidden');
  loadAll();
});
</script>
</body>
</html>
