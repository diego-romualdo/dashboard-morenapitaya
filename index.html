<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM · Morena Pitaya</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --rosa:#e8375a; --rosa2:#ff6b8a; --verde:#7ab648;
    --navy:#0f1923; --navy2:#162030; --navy3:#1e2d40;
    --card:#192535; --border:#243448; --text:#e8edf3;
    --muted:#7a94b0; --gold:#f5c842;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--navy);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
  
  /* Sidebar */
  .sidebar{position:fixed;top:0;left:0;width:220px;height:100vh;background:var(--navy2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:32px 0;z-index:100;transition:transform .3s;}
  .logo{padding:0 24px 28px;border-bottom:1px solid var(--border);}
  .logo-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:900;color:var(--rosa);letter-spacing:-.5px;line-height:1.2;}
  .logo-sub{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:4px;}
  .nav{padding:20px 0;flex:1;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:10px 24px;font-size:13px;color:var(--muted);cursor:pointer;transition:all .2s;border-left:3px solid transparent;}
  .nav-item:hover,.nav-item.active{color:var(--text);background:rgba(232,55,90,.08);border-left-color:var(--rosa);}
  .nav-icon{font-size:16px;width:20px;text-align:center;}
  .sidebar-footer{padding:16px 24px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);}
  .live-dot{display:inline-block;width:6px;height:6px;background:var(--verde);border-radius:50%;margin-right:6px;animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

  /* Hamburger e overlay */
  .hamburger{display:none;position:fixed;top:16px;left:16px;z-index:200;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 10px;cursor:pointer;font-size:18px;}
  .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99;}

  /* Main */
  .main{margin-left:220px;padding:28px;min-height:100vh;}

  /* Header */
  .page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;}
  .page-title{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:var(--text);line-height:1.2;}
  .page-subtitle{font-size:13px;color:var(--muted);margin-top:4px;}
  .header-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}

  /* Period Tabs */
  .period-tabs{display:flex;gap:4px;background:var(--navy3);padding:4px;border-radius:10px;border:1px solid var(--border);}
  .period-tab{padding:6px 14px;font-size:12px;font-weight:500;border-radius:7px;cursor:pointer;color:var(--muted);transition:all .2s;white-space:nowrap;}
  .period-tab.active{background:var(--rosa);color:#fff;}
  .period-tab:hover:not(.active){color:var(--text);}

  .update-badge{background:rgba(122,182,72,.15);border:1px solid rgba(122,182,72,.3);color:var(--verde);font-size:11px;padding:6px 12px;border-radius:20px;display:flex;align-items:center;gap:6px;white-space:nowrap;}
  .refresh-btn{background:rgba(232,55,90,.1);border:1px solid rgba(232,55,90,.3);color:var(--rosa);font-size:11px;padding:6px 12px;border-radius:20px;cursor:pointer;transition:all .2s;}
  .refresh-btn:hover{background:rgba(232,55,90,.2);}

  /* Pages */
  .page{display:none;} 
  .page.active{display:block;}

  /* KPI */
  .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
  .kpi-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;position:relative;overflow:hidden;transition:transform .2s,border-color .2s;}
  .kpi-card:hover{transform:translateY(-2px);border-color:var(--rosa);}
  .kpi-icon{font-size:18px;margin-bottom:10px;}
  .kpi-value{font-family:'Playfair Display',serif;font-size:30px;font-weight:700;line-height:1;color:var(--text);}
  .kpi-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:6px;}

  /* Error */
  .error-bar{background:rgba(232,55,90,.1);border:1px solid rgba(232,55,90,.3);color:var(--rosa);font-size:12px;padding:10px 16px;border-radius:8px;margin-bottom:16px;display:none;}

  /* Responsive */
  @media(max-width:820px){
    .sidebar{transform:translateX(-100%);}
    .sidebar.open{transform:translateX(0);}
    .sidebar-overlay.open{display:block;}
    .hamburger{display:block;}
    .main{margin-left:0;padding:16px;padding-top:56px;}
  }
</style>
</head>
<body>

<!-- Loading -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-logo">Morena Pitaya</div>
  <div class="loading-bar"><div class="loading-fill"></div></div>
  <div class="loading-text">Carregando dados do CRM…</div>
</div>

<!-- Hamburger -->
<button class="hamburger" onclick="toggleSidebar()">☰</button>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="logo">
    <div class="logo-title">Morena Pitaya</div>
    <div class="logo-sub">CRM Dashboard</div>
  </div>
  <nav class="nav">
    <div class="nav-item active" onclick="showPage('overview',this)"><span class="nav-icon">📊</span> Visão Geral</div>
  </nav>
  <div class="sidebar-footer">
    <span class="live-dot"></span>Atualização automática · 60s
    <div style="margin-top:6px;font-size:10px;" id="lastUpdateTime">—</div>
  </div>
</aside>

<!-- Main -->
<main class="main">
  <div class="error-bar" id="errorBar">⚠️ Erro ao carregar dados. Verifique o console (F12).</div>

  <div class="page-header">
    <div>
      <div class="page-title" id="pageTitle">Visão Geral</div>
      <div class="page-subtitle" id="pageSubtitle">CRM ao vivo · Morena Pitaya</div>
    </div>
    <div class="header-right">
      <button class="refresh-btn" onclick="loadAll()">↻ Atualizar</button>
    </div>
  </div>

  <!-- Página Visão Geral -->
  <div class="page active" id="page-overview">
    <div class="kpi-grid" id="kpiGrid">
      <!-- KPIs serão preenchidos via JS -->
    </div>
  </div>
</main>

<script>
// ─── Config ──────────────────────────────────────────────────────────────────
const SB_URL = 'https://supabase.morenapitaya.com';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjoxNzc2MDQ5MjAwLCJleHAiOjE5MzM4MTU2MDB9.PVvpnzkL7mdGkMKO1XCR2c8awZuZJ6NyeT_3qB06EMI';

const HEADERS = { 
  apikey: SB_KEY, 
  Authorization: `Bearer ${SB_KEY}` 
};

// ─── Utils ───────────────────────────────────────────────────────────────────
function fmtNum(n) {
  return (n || 0).toLocaleString('pt-BR');
}

// ─── Funções simples de navegação ───────────────────────────────────────────
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
}

function showError(show) {
  const el = document.getElementById('errorBar');
  if (el) el.style.display = show ? 'block' : 'none';
}

// ─── Carregar dados ─────────────────────────────────────────────────────────
async function loadAll() {
  showError(false);
  try {
    await loadOverview();
    document.getElementById('lastUpdateTime').textContent = 'Atualizado: ' + new Date().toLocaleTimeString('pt-BR');
  } catch (e) {
    console.error("Erro geral:", e);
    showError(true);
  }
}

async function loadOverview() {
  try {
    console.log("🔄 Tentando conectar ao Supabase...");

    // Busca simples de interações (sem filtro problemático)
    const response = await fetch(
      `${SB_URL}/rest/v1/crm_interactions?select=id&limit=1`,
      { 
        headers: { ...HEADERS, Prefer: 'count=exact' },
        method: 'GET'
      }
    );

    if (!response.ok) {
      throw new Error(`HTTP ${response.status} - ${response.statusText}`);
    }

    const totalInter = parseInt(response.headers.get('content-range')?.split('/')[1] ?? 0);

    // Atualiza a tela
    const kpiGrid = document.getElementById('kpiGrid');
    if (kpiGrid) {
      kpiGrid.innerHTML = `
        <div class="kpi-card rosa">
          <div class="kpi-icon">💬</div>
          <div class="kpi-value">${fmtNum(totalInter)}</div>
          <div class="kpi-label">Total de Interações</div>
          <div class="kpi-sub" style="color:var(--verde);">Conexão OK ✓</div>
        </div>
        <div class="kpi-card verde">
          <div class="kpi-icon">✅</div>
          <div class="kpi-value">OK</div>
          <div class="kpi-label">Supabase conectado</div>
        </div>
      `;
    }

    console.log("✅ Dashboard carregado com sucesso. Total interações:", totalInter);

  } catch (err) {
    console.error("❌ Erro ao conectar com Supabase:", err);
    showError(true);

    const kpiGrid = document.getElementById('kpiGrid');
    if (kpiGrid) {
      kpiGrid.innerHTML = `
        <div class="kpi-card rosa" style="grid-column:1/-1;text-align:center;padding:40px 20px;">
          <div style="font-size:48px;margin-bottom:16px;">⚠️</div>
          <div style="font-size:18px;color:var(--rosa);margin-bottom:8px;">Falha na conexão</div>
          <div style="font-size:13px;color:var(--muted);">Abra o console (F12) e veja o erro detalhado</div>
        </div>
      `;
    }
  }
}

// ─── Inicialização ───────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  console.log("✅ DOM carregado");
  
  // Remove loading
  const loading = document.getElementById('loadingOverlay');
  if (loading) loading.classList.add('hidden');

  // Carrega os dados
  loadAll();
});
</script>
</body>
</html>
